services:
  app:
    container_name: laravel-app
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/var/www/html
    depends_on:
      - postgres
    networks:
      - laravel-super-apps

  postgres:
    container_name: laravel-db
    image: postgres:15
    restart: always
    volumes:
      - ./docker/postgres/data:/var/lib/postgres/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - laravel-super-apps

  web:
    container_name: laravel-web
    image: nginx:stable-alpine
    restart: always
    ports:
      - "8000:80" # Laravel artisan serve
      - "5173:80" # Vite HMR
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-super-apps

networks:
  laravel-super-apps:
    driver: bridge
